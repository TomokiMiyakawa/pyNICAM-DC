name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The model uses Python 3.10+ syntax (structural pattern matching /
        # match-case in nhm/share/mod_ideal_init.py), so 3.9 cannot parse the
        # source and is intentionally excluded.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system requirements
      run: |
        sudo apt-get update
        sudo apt-get install libopenmpi-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel
        pip install cython
        pip install flake8 pytest
        pip install mpi4py
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build only on Python syntax errors. Undefined-name (F82)
        # checking is reported as a warning below instead of failing the build:
        # the legacy/disabled jax code paths reference jnp/jax without a
        # module-level import (superseded by nhm/dynamics/kernels/), which would
        # otherwise trip F821.
        flake8 . --count --select=E9,F63,F7 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest

  # Stage A -- numpy end-to-end. Installs the full RUN environment
  # (requirements-run.txt, incl. the mandatory zarr<3 pin) and an MPI launcher, then
  # runs the whole suite on the numpy backend: the kernel bit-exactness tests AND the
  # hermetic Jablonowski-Williamson dynamics smoke (test/test_smoke_dynamics.py). The
  # smoke is fully self-contained -- it runs case2 with IDEAL init on the committed
  # ~8 MB grid, so NO dataset download is needed. No jax here (jax-CPU is Stage B).
  numpy-e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install system requirements (MPI runtime + launcher)
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenmpi-dev openmpi-bin
    - name: Install run dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements-run.txt
    - name: Run numpy end-to-end suite (kernels + dynamics smoke)
      run: |
        pytest -v
