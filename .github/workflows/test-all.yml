name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The model uses Python 3.10+ syntax (structural pattern matching /
        # match-case in nhm/share/mod_ideal_init.py), so 3.9 cannot parse the
        # source and is intentionally excluded.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system requirements
      run: |
        sudo apt-get update
        sudo apt-get install libopenmpi-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel
        pip install cython
        pip install flake8 pytest
        pip install mpi4py
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build only on Python syntax errors. Undefined-name (F82)
        # checking is reported as a warning below instead of failing the build:
        # the legacy/disabled jax code paths reference jnp/jax without a
        # module-level import (superseded by nhm/dynamics/kernels/), which would
        # otherwise trip F821.
        flake8 . --count --select=E9,F63,F7 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest

  # Stage A -- numpy end-to-end. Installs the full RUN environment
  # (requirements-run.txt, incl. the mandatory zarr<3 pin) and an MPI launcher, then
  # runs the whole suite on the numpy backend: the kernel bit-exactness tests AND the
  # hermetic Jablonowski-Williamson dynamics smoke (test/test_smoke_dynamics.py). The
  # smoke is fully self-contained -- it runs case2 with IDEAL init on the committed
  # ~8 MB grid, so NO dataset download is needed. No jax here (jax-CPU is Stage B).
  numpy-e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install system requirements (MPI runtime + launcher)
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenmpi-dev openmpi-bin
    - name: Install run dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements-run.txt
    - name: Run numpy end-to-end suite (kernels + dynamics smoke)
      run: |
        pytest -v

  # Stage B -- jax-CPU parity. Runs the kernel numpy-vs-jax parity tests and the
  # JAX jit-semantics tests (which SKIP in the numpy jobs) against a small,
  # deliberately-chosen set of jax versions rather than a churny all-versions matrix:
  #   * gate   (jax==0.11.0) : the version we validate/ship against -- REQUIRED.
  #   * floor  (jax==0.8.2)  : oldest supported jax -- REQUIRED, brackets the window.
  #   * canary (latest)      : unpinned; continue-on-error, an early warning when a
  #                            new jax release drifts, without red-flagging PRs.
  # Bump the gate deliberately once a newer jax is validated. The kernels touch only a
  # tiny, stable jax surface (jax.numpy / jax.jit / jax.config / one lax.scan), so this
  # spread is sufficient -- 0.8.2, 0.9.0 and 0.11.0 were verified green locally.
  # CPU-only, single Python (jax parity is python-insensitive; the build matrix already
  # covers py3.10-3.14). Add a version by adding one matrix entry.
  jax-cpu:
    name: jax-cpu (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - jax: "0.11.0"
            label: "0.11.0 pinned gate"
            experimental: false
          - jax: "0.8.2"
            label: "0.8.2 floor"
            experimental: false
          - jax: ""
            label: "latest canary"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install system requirements (MPI headers for mpi4py build)
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenmpi-dev
    - name: Install run dependencies + jax
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -r requirements-run.txt
        if [ -n "${{ matrix.jax }}" ]; then pip install "jax==${{ matrix.jax }}"; else pip install jax; fi
        python -c "import jax, jaxlib; print('jax', jax.__version__, 'jaxlib', jaxlib.__version__)"
    - name: Run kernel parity + jit-semantics on jax-CPU
      env:
        JAX_PLATFORMS: cpu
      run: |
        pytest test/test_kernels.py test/prepost_jit_semantics_test.py -v
