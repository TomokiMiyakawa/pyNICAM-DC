[pytest]
# Bound discovery to the real unit-test tree. Without this, bare `pytest` from the
# repo root also imports the reference/harness files under
# pynicamdc/nhm/dynamics/proto/ and various tools/ spikes (named test_* / *_test)
# -- they are NOT pytest tests, and importing them is a recurring breakage source.
testpaths = test

markers =
    slow: end-to-end / long-running tests (e.g. the dynamics smoke); need the full
        run environment (requirements-run.txt) and an MPI launcher.
